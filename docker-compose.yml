name: seo-agent-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seo_agent}
      POSTGRES_USER: ${POSTGRES_USER:-seo_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-only-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: seo-agent-platform-app:latest
    build:
      context: .
      dockerfile: docker/platform-api.Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-seo_agent}:${POSTGRES_PASSWORD:-local-only-change-me}@postgres:5432/${POSTGRES_DB:-seo_agent}
      REDIS_URL: redis://redis:6379/0
      LEGACY_SQLITE_PATH: /legacy-data/seo-control.sqlite3
    ports:
      - "${PLATFORM_API_PORT:-8010}:8010"
    volumes:
      - ./data:/legacy-data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "platform_api.main:app", "--host", "0.0.0.0", "--port", "8010"]

  worker:
    image: seo-agent-platform-app:latest
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-seo_agent}:${POSTGRES_PASSWORD:-local-only-change-me}@postgres:5432/${POSTGRES_DB:-seo_agent}
      REDIS_URL: redis://redis:6379/0
      LEGACY_SQLITE_PATH: /legacy-data/seo-control.sqlite3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/legacy-data:ro
    command: ["celery", "-A", "platform_api.celery_app.celery_app", "worker", "--loglevel=INFO"]

volumes:
  postgres_data:
  redis_data:
